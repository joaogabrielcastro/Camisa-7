services:
  postgres:
    image: postgres:16-alpine
    container_name: camisa7-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-camisa7}
      POSTGRES_USER: ${POSTGRES_USER:-camisa7_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camisa7_pass}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
